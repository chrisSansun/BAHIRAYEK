<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bāhirayek</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

  .wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .side {
    position: absolute;
    top: 0; bottom: 0;
    transition: width 0.8s cubic-bezier(0.77, 0, 0.18, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .side-him { left: 0; width: 50%; background: #26323A; }
  .side-her { right: 0; width: 50%; background: #D05F3F; }

  .side-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease 0.45s;
    text-align: center;
  }
  .wrap.him-active .side-him .side-inner,
  .wrap.her-active .side-her .side-inner { opacity: 1; }

  .world-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #F5F2EB;
    margin-bottom: 10px;
  }
  .world-sub {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.4);
    margin-bottom: 38px;
  }
  .world-enter {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 11px 32px;
    border: 1px solid rgba(245,242,235,0.3);
    color: #F5F2EB;
    background: none;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .world-enter:hover { background: rgba(245,242,235,0.07); border-color: rgba(245,242,235,0.6); }

  .divider {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(245,242,235,0.18);
    transform: translateX(-50%);
    transition: left 0.8s cubic-bezier(0.77, 0, 0.18, 1);
    z-index: 10;
  }

  .centre {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .him-her-wrap {
    display: none;
  }
  .wordmark {
    font-size: clamp(24px, 3.5vw, 42px);
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #F5F2EB;
    margin-bottom: 12px;
  }
  .tagline {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.45);
    margin-bottom: 30px;
  }
  .him-her {
    display: inline-flex;
    align-items: center;
    pointer-events: all;
  }
  .hh-btn {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 9px 26px;
    cursor: pointer;
    color: rgba(245,242,235,0.75);
    border: 1px solid rgba(245,242,235,0.2);
    background: none;
    transition: color 0.2s, border-color 0.2s;
    line-height: 1;
  }
  .hh-btn:first-child { border-right: none; }
  .hh-btn:hover { color: #F5F2EB; border-color: rgba(245,242,235,0.55); }

  .wrap.him-active .side-him { width: 100%; }
  .wrap.him-active .side-her { width: 0%; }
  .wrap.him-active .divider { left: 100%; }
  .wrap.him-active .centre { opacity: 0; pointer-events: none; }
  .wrap.him-active .him-her-wrap { opacity: 0; pointer-events: none; }

  .wrap.her-active .side-her { width: 100%; }
  .wrap.her-active .side-him { width: 0%; }
  .wrap.her-active .divider { left: 0%; }
  .wrap.her-active .centre { opacity: 0; pointer-events: none; }
  .wrap.her-active .him-her-wrap { opacity: 0; pointer-events: none; }

  .back-btn {
    display: none;
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.35);
    cursor: pointer;
    z-index: 30;
    border: none;
    background: none;
    padding: 8px 16px;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover { color: rgba(245,242,235,0.75); }
  .wrap.him-active .back-btn,
  .wrap.her-active .back-btn { display: block; }
</style>
</head>
<body>
<div class="wrap" id="wrap">

  <div class="side side-him">
    <div class="side-inner">
      <div class="world-title">Him</div>
      <div class="world-sub">Menswear collection</div>
      <button class="world-enter" onclick="window.location.href='him.html'">Enter</button>
    </div>
  </div>

  <div class="side side-her">
    <div class="side-inner">
      <div class="world-title">Her</div>
      <div class="world-sub">Womenswear collection</div>
      <button class="world-enter" onclick="window.location.href='her.html'">Enter</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="centre" id="centre">
    <div class="wordmark">Bāhirayek</div>
    <div class="tagline">Proudly Apart.</div>
    <div class="him-her">
      <button class="hh-btn" onclick="activate('him')">Him</button>
      <button class="hh-btn" onclick="activate('her')">Her</button>
    </div>
  </div>

  <button class="back-btn" onclick="reset()">← Back</button>

</div>
<script>
  function activate(side) {
    var wrap = document.getElementById('wrap');
    wrap.classList.remove('him-active','her-active');
    wrap.classList.add(side + '-active');
  }
  function reset() {
    document.getElementById('wrap').classList.remove('him-active','her-active');
  }
</script>
</body>
</html>
